name: CI - Testes de API e Relatório Allure

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Rodar os testes
        id: run_tests
        continue-on-error: true
        run: mvn clean test

      - name: Gerar relatório Allure
        if: always()
        run: mvn allure:report

      - name: Publicar relatório Allure como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin
          retention-days: 30

      - name: Publicar resultados brutos do Allure como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results
          retention-days: 30

      - name: Falhar o job se os testes falharam
        if: steps.run_tests.outcome == 'failure'
        run: exit 1